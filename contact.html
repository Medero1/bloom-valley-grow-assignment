<!DOCTYPE html>
<html lang='en'>
<head>
  <meta charset='UTF-8'>
  <meta name='viewport' content='width=device-width, initial-scale=1.0'>
  <title>Contact</title>
  <link rel='stylesheet' href='style.css'>
</head>
<body>
<header>
  <div class='container'>
    <h1>Bloom Valley Landscaping</h1>
    <nav>
      <a href='index.html'>Home</a>
      <a href='gallery.html'>Gallery</a>
      <a href='custom.html'>Services</a>
      <a href='our-story.html'>Our Story</a>
      <a href='contact.html' class='active'>Contact</a>
    </nav>
  </div>
</header>

<section class='container'>
  <h2>Send us a message</h2>
  <form id='contactForm'>
    <fieldset>
      <legend>Send us a message</legend>

      <label>Name:</label><br>
      <input type='text' required><br><br>

      <label>Email:</label><br>
      <input type='email' required><br><br>

      <label>Service Needed:</label><br>
      <select required>
        <option value=''>Select a service</option>
        <option>Lawn Care</option>
        <option>Garden Design</option>
        <option>Tree &amp; Shrub Care</option>
      </select><br><br>

      <label>Message:</label><br>
      <textarea rows='4' cols='30' required></textarea><br><br>

      <input type='submit' value='Submit'>
    </fieldset>
  </form>
</section>

<footer>
  <div class='container'>
    <p>© 2026 Bloom Valley Landscaping</p>
  </div>
</footer>

<script>
document.addEventListener('DOMContentLoaded', function() {
  document.getElementById('contactForm').addEventListener('submit', function(e) {
    alert('Thank you for contacting us.');
    e.preventDefault();
  });
});
</script>
</body>
</html>
